  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
use_4bit: true
use_bf16: true
use_fp16: false
torch_dtype: bfloat16
attn_implementation:
logging_steps: 5
save_steps: 100
eval_steps: 100
seed: 42
local_files_only: true
status: interface_only
